events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11;

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/anteiku.crt;
        ssl_certificate_key /etc/nginx/ssl/anteiku.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            set $upstream_frontend frontend;
            proxy_pass http://$upstream_frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        location /api/ {
            set $upstream_backend backend;
            proxy_pass http://$upstream_backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /ws {
            set $upstream_backend_ws backend;
            proxy_pass http://$upstream_backend_ws:8080; 
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /notify {
            proxy_pass http://notify:9921;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        location ^~ /notify/ws {
            proxy_pass http://notify:6969;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /logout {
            proxy_pass http://backend:8080/logout;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 5601 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/anteiku.crt;
        ssl_certificate_key /etc/nginx/ssl/anteiku.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            set $upstream_kibana kibana;
            proxy_pass http://$upstream_kibana:5601;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    server {
        listen 9200 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/ssl/anteiku.crt;
        ssl_certificate_key /etc/nginx/ssl/anteiku.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            set $upstream_es elasticsearch;
            proxy_pass http://$upstream_es:9200;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}