# https://www.howtouselinux.com/post/complete-guide-to-redis-commands-faq-configuration-and-troubleshooting#Redis_Configuration

# Network
bind 0.0.0.0
port 6379
tcp-keepalive 300
timeout 0

# General
daemonize yes
always-show-logo yes

# Database
# databases 16

# Memory
# Maximum memory
maxmemory 2gb

# Security
# requirepass "your_secure_password"
rename-command FLUSHDB ""
rename-command FLUSHALL ""